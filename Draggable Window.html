			border-radius: 15px; /* now rounded on ALL sides */

			}

			.sidenavcontent {
			position: absolute;
			top: 0;
			bottom: 0;
			left: 0;
			right: 0;

			overflow-y: auto;
			overflow-x: hidden;

		<script>
			//Make the DIV element draggagle:
			dragElement(document.getElementById("windowdiv"));

			function dragElement(elmnt) {
			var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
			if (document.getElementById(elmnt.id + "header")) {
				/* if present, the header is where you move the DIV from:*/
				document.getElementById(elmnt.id + "header").onmousedown = dragMouseDown;
			} else {
				/* otherwise, move the DIV from anywhere inside the DIV:*/
				elmnt.onmousedown = dragMouseDown;
			}

			function dragMouseDown(e) {
				e = e || window.event;
				e.preventDefault();
				// get the mouse cursor position at startup:
				pos3 = e.clientX;
				pos4 = e.clientY;
				document.onmouseup = closeDragElement;
				// call a function whenever the cursor moves:
				document.onmousemove = elementDrag;
			}

			function elementDrag(e) {
				e = e || window.event;
				e.preventDefault();
				// calculate the new cursor position:
				pos1 = pos3 - e.clientX;
				pos2 = pos4 - e.clientY;
				pos3 = e.clientX;
				pos4 = e.clientY;
				// set the element's new position:
				elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
				elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
			}

			function closeDragElement() {
				/* stop moving when mouse button is released:*/
				document.onmouseup = null;
				document.onmousemove = null;
			}
			}
		</script>

		<script>
			function updateScale() {
			const wrapper = document.querySelector('.iframe-wrapper');
			const iframe = wrapper.querySelector('iframe');
			const scale = wrapper.clientWidth / 1920;
			iframe.style.setProperty('--scale', scale);
			}

			window.addEventListener('resize', updateScale);
			window.addEventListener('load', updateScale);
		</script>

		<script>
			$(window).on("load", function () {
				// load saved state
				var ponytoggle = localStorage.getItem("ponytoggle") === "true";

				// function to update BrowserPonies based on toggle
				function updatePonies() {
					if (ponytoggle) {
						BrowserPonies.stop();
					} else {
						BrowserPonies.start();
					}
				}

				// small delay to ensure BrowserPonies is ready
				setTimeout(updatePonies, 100); // 100ms delay

				// click handler
				$("#bt_toggleponies").click(function () {
					ponytoggle = !ponytoggle;           // flip the toggle
					localStorage.setItem("ponytoggle", ponytoggle);
					updatePonies();                      // apply new state
				});
			});

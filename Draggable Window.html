			<style>
				iframe {
				display: block;
				width: 100%;
				}

				#mydiv {
				position: absolute;
				z-index: 9;
				background-color: #c379ff;
				text-align: center;
				border: 4px solid #c379ff;
				width: 100%;
				max-width: 600px;
				border-radius: 5px;
				}

				#mydivheader {
				padding: 5px;
				cursor: move;
				z-index: 10;
				background-color: #c379ff;
				color: #fff;

				width: 100%;
				box-sizing: border-box;
				display: flex;
				justify-content: space-between; /* pushes items apart */
				align-items: center;            /* vertical alignment */
				}

				#divheadertext {
					max-width:75%;
				}
				.iframe-wrapper {
				width: 100%;
				aspect-ratio: 16 / 9;   /* keeps it proportional */
				overflow: hidden;
				position: relative;
				border-radius:5px;
				}

				.iframe-wrapper iframe {
				width: 1920px;
				height: 1080px;
				border: none;

				transform-origin: top left;

				/* scale based on container width */
				transform: scale(var(--scale, 1));
				}
				#reenablewindow {
					display: none;
				}
			</style>
		</head>
		<body>
			<div id="mydiv">
				<div id="mydivheader">
					<div id="divheadertext">
						Stupid fucking window (click my logo thing)
					</div>
					<input
						type="image"
						src="https://thatponyjules.nekoweb.org/TPJ LOGO.png"
						width="20%"
						id="closewindow"
					/>
				</div>
				<div class="iframe-wrapper">
					<iframe
						src="https://thatponyjules.nekoweb.org/fuckyounova"
					></iframe>
				</div>
			</div>

			<input type="image" src="narc.png" height="20%" id="bt_toggleponies"/>
				<input type="image" src="narc.png" height="20%" style="filter: hue-rotate(180deg);" id="reenablewindow"/>
			<script>
				//Make the DIV element draggagle:
				dragElement(document.getElementById("mydiv"));

				function dragElement(elmnt) {
				var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
				if (document.getElementById(elmnt.id + "header")) {
					/* if present, the header is where you move the DIV from:*/
					document.getElementById(elmnt.id + "header").onmousedown = dragMouseDown;
				} else {
					/* otherwise, move the DIV from anywhere inside the DIV:*/
					elmnt.onmousedown = dragMouseDown;
				}

				function dragMouseDown(e) {
					e = e || window.event;
					e.preventDefault();
					// get the mouse cursor position at startup:
					pos3 = e.clientX;
					pos4 = e.clientY;
					document.onmouseup = closeDragElement;
					// call a function whenever the cursor moves:
					document.onmousemove = elementDrag;
				}

				function elementDrag(e) {
					e = e || window.event;
					e.preventDefault();
					// calculate the new cursor position:
					pos1 = pos3 - e.clientX;
					pos2 = pos4 - e.clientY;
					pos3 = e.clientX;
					pos4 = e.clientY;
					// set the element's new position:
					elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
					elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
				}

				function closeDragElement() {
					/* stop moving when mouse button is released:*/
					document.onmouseup = null;
					document.onmousemove = null;
				}
				}
			</script>

			<script>
				function updateScale() {
				const wrapper = document.querySelector('.iframe-wrapper');
				const iframe = wrapper.querySelector('iframe');
				const scale = wrapper.clientWidth / 1920;
				iframe.style.setProperty('--scale', scale);
				}

				window.addEventListener('resize', updateScale);
				window.addEventListener('load', updateScale);
			</script>
			<script>
				$("#closewindow").click(function () {
					$("#mydiv").hide();              // hide the window
					$("#reenablewindow").show();     // show reopen button
				});
				$("#reenablewindow").click(function () {
					$("#mydiv").show();              // show the window
					$("#reenablewindow").hide();     // hide button again
				});
			</script>

			<script>
				$(window).on("load", function () {
					// load saved state
					var ponytoggle = localStorage.getItem("ponytoggle") === "true";

					// function to update BrowserPonies based on toggle
					function updatePonies() {
						if (ponytoggle) {
							BrowserPonies.stop();
						} else {
							BrowserPonies.start();
						}
					}

					// small delay to ensure BrowserPonies is ready
					setTimeout(updatePonies, 100); // 100ms delay

					// click handler
					$("#bt_toggleponies").click(function () {
						ponytoggle = !ponytoggle;           // flip the toggle
						localStorage.setItem("ponytoggle", ponytoggle);
						updatePonies();                      // apply new state
					});
				});
			</script>

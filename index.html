			.cbt {
			  display: flex;
			  justify-content: center;
			  align-items: center;
			  color: white;
			  text-align: center;
			  font-family: 'DTM', sans-serif;
			}

			   .fade-in {
			     opacity: 0;
			     transform: translateY(-20px); /* start slightly above */
			     animation: fadeInMove 0.1s ease-in-out forwards;
			   }
			   .fade-ibs {
			     opacity: 0;
			     transform: translateY(-20px); /* start slightly above */
			     animation: fadeInMont 2s ease-in-out forwards;
			   }

			   @keyframes fadeInMove {
			     0% {
			       opacity: 1;
			       transform: translateY(-20); /* move from top */
			     }
			     100% {
			       opacity: 0;
			       transform: translateY(0); /* settle in place */
			     }
			   }

			   @keyframes fadeInMont {
			     0% {
			       opacity: 0;
			       transform: translateY(-20); /* move from top */
			     }
			     99% {
			       opacity: 0;
			       transform: translateY(0); /* settle in place */
			     }
			     100% {
			       opacity: 1;
			       transform: translateY(0); /* settle in place */
			     }
			   }

			.text-with-gif {

			  align-items: center;
			  justify-content: center;
			  gap: 5px; /* space between text and gif */
			}

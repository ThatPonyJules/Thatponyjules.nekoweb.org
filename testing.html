<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<style>
/* Floating sidebar */
.sidenav {
  position: fixed;
  left: 15px;        /* <-- detached from left */
  top: 50px;
  bottom: 50px;
  width: 250px;
  max-height: 90%;

  background-color: #111;
  padding-top: 20px;

  transform: translateX(-260px); /* fully hidden */
  transition: transform 0.4s ease;

  border-radius: 5px; /* now rounded on ALL sides */
  box-shadow: 0 0 15px rgba(0,0,0,0.5);

}

.sidenavcontent {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  right: 0;

  overflow-y: auto;
  overflow-x: hidden;

  padding-top: 20px;
  direction: rtl;
  padding-left: 10px;
}

.sidenavcontent::-webkit-scrollbar {
  width: 8px;
}

.sidenavcontent::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 10px;
}

.sidenavcontent::-webkit-scrollbar-track {
  background: transparent;
}

.sidenavcontent a, p, li, img {
  direction: ltr; /* normal text again */
}

/* Open state */
.sidenav.open {
  transform: translateX(0);
}

/* Links */
.sidenav a {
  padding: 10px 20px;
  text-decoration: none;
  font-size: 20px;
  color: #818181;
  display: block;
}

.sidenav p {
  color: #fff
}
.sidenav a:hover {
  color: #f1f1f1;
}

/* Tab button that sticks out */
.sidenavtoggle {
  position: absolute;
  right: -25px;

  top: 0;
  bottom: 0;              /* 👈 stretch full height */
  height: 100%;

  display: flex;
  align-items: center;   /* 👈 center the icon vertically */
  justify-content: center;

  background: #111;
  color: white;
  padding: 0 10px;       /* horizontal padding only */

  cursor: pointer;

  border-radius: 0 10px 10px 0;
}

.arrow {
  display: inline-block;
  transition: transform 0.3s ease;
  font-size: 20px;
}

/* When sidebar is open, rotate arrow */
.sidenav.open .arrow {
  transform: rotate(180deg);
}

</style>
</head>
<body>

<div id="mySidenav" class="sidenav">
